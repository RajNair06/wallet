</g>
<line x1="340" y1="64" x2="340" y2="84" stroke="var(--t)" stroke-width="0.5" opacity="0.45" marker-end="url(#arrow)" style="fill:rgb(0, 0, 0);stroke:rgb(156, 154, 146);color:rgb(251, 251, 254);stroke-width:0.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.45;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

